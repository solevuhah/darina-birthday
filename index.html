<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>С Днём Рождения, Дарина! 🎂</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1 class="title">С Днём Рождения, Дарина! 🎂</h1>
        <p class="subtitle">Ты самая лучшая! 💕</p>
        
        <button class="gift-btn" onclick="openGift()">
            🎁 Получить подарок
        </button>
        
        <div class="gift-box hidden" id="giftBox">
            <div class="gift-content">
                <span class="close-btn" onclick="closeGift()">✕</span>
                <h2>Твой подарок! 🎉</h2>
                <p>Выбери, что хочешь посмотреть:</p>
                <div class="gift-buttons">
                    <button onclick="openMedia('photo')">📸 Фото</button>
                    <button onclick="openMedia('video')">🎥 Видео</button>
                </div>
            </div>
        </div>
        
        <div class="media-viewer hidden" id="mediaViewer">
            <span class="close-btn" onclick="closeMedia()">✕</span>
            <div class="media-content" id="mediaContent"></div>
        </div>
    </div>
    
    <script src="script.js"></script>
</body>
</html>
