<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>С Днём Рождения, Дарина! 🎂</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Видео фон -->
    <video class="bg-video" autoplay muted loop playsinline id="bgVideo">
        <source src="media/background.mp4" type="video/mp4">
    </video>
    
    <div class="overlay"></div>
    
    <div class="container">
        <h1 class="title">С Днём Рождения, Дарина! 🎂</h1>
        <p class="subtitle">Ты самая лучшая! 💕</p>
        
        <!-- Одна кнопка -->
        <button class="gift-btn" id="giftBtn" onclick="showButtons()">
            🎁 Получить подарок
        </button>
        
        <!-- Две кнопки (скрыты) -->
        <div class="buttons-group hidden" id="buttonsGroup">
            <button class="photo-btn" onclick="openMedia('photo')">
                📸 Фото
            </button>
            <button class="video-btn" onclick="openMedia('video')">
                🎥 Видео
            </button>
        </div>
    </div>
    
    <!-- Просмотр медиа -->
    <div class="media-viewer hidden" id="mediaViewer">
        <span class="close-btn" onclick="closeMedia()">✕</span>
        <div class="media-content" id="mediaContent"></div>
    </div>
    
    <script src="script.js"></script>
</body>
</html>
