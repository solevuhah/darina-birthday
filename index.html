<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>С Днём Рождения, Дарина! 🎂</title>
    <style>
        /* Общие стили и сброс параметров */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }

        body, html {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #000;
            color: #fff;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* Задний фон: видео на весь экран */
        .bg-video {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: -2;
            object-fit: cover;
            opacity: 1;
            background-color: #000; /* Временный черный фон до загрузки */
        }

        /* Затемнение поверх видео для читаемости текста */
        .overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.55);
            z-index: -1;
        }

        /* Основной контейнер */
        .container {
            text-align: center;
            z-index: 10;
            padding: 20px;
            max-width: 600px;
            width: 90%;
            animation: fadeIn 1.5s ease-out;
        }

        h1 {
            font-size: 2.5rem;
            margin-bottom: 10px;
            text-shadow: 0 0 15px rgba(255, 105, 180, 0.8), 0 0 30px rgba(255, 20, 147, 0.5);
            color: #fff;
            font-weight: 800;
        }

        p {
            font-size: 1.2rem;
            color: #ff99c8;
            margin-bottom: 30px;
            letter-spacing: 2px;
            text-transform: uppercase;
            font-weight: 600;
            text-shadow: 0 2px 4px rgba(0,0,0,0.5);
        }

        /* Кнопка подарка */
        .gift-btn {
            background: linear-gradient(45deg, #ff007f, #ff5e62);
            color: white;
            border: none;
            padding: 18px 36px;
            font-size: 1.3rem;
            font-weight: bold;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 0 20px rgba(255, 0, 127, 0.6), inset 0 0 10px rgba(255, 255, 255, 0.3);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .gift-btn:hover {
            transform: scale(1.08);
            box-shadow: 0 0 35px rgba(255, 0, 127, 0.9);
        }

        .gift-btn:active {
            transform: scale(0.95);
        }

        /* Модальные окна (Стеклянный эффект) */
        .modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.85);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 100;
            opacity: 1;
            transition: opacity 0.3s ease;
        }

        .modal.hidden {
            display: none;
            opacity: 0;
            pointer-events: none;
        }

        .modal-box {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            padding: 40px;
            border-radius: 24px;
            max-width: 450px;
            width: 90%;
            text-align: center;
            position: relative;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5);
            animation: scaleUp 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .modal-box h2 {
            margin-bottom: 25px;
            font-size: 1.8rem;
            color: #fff;
        }

        .modal-box button {
            display: block;
            width: 100%;
            background: rgba(255, 255, 255, 0.15);
            color: white;
            border: 1px solid rgba(255, 255, 255, 0.3);
            padding: 14px;
            margin: 12px 0;
            font-size: 1.1rem;
            border-radius: 12px;
            cursor: pointer;
            transition: background 0.3s, transform 0.2s;
        }

        .modal-box button:hover {
            background: rgba(255, 255, 255, 0.3);
            transform: translateY(-2px);
        }

        /* Кнопка закрытия */
        .close {
            position: absolute;
            top: 15px;
            right: 20px;
            font-size: 1.8rem;
            cursor: pointer;
            color: rgba(255, 255, 255, 0.6);
            transition: color 0.3s;
        }

        .close:hover {
            color: #fff;
        }

        /* Окно для просмотра медиа */
        #mediaModal {
            flex-direction: column;
        }

        #mediaContent {
            max-width: 90%;
            max-height: 80%;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        #mediaContent img, #mediaContent video {
            max-width: 100%;
            max-height: 80vh;
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.8);
            border: 2px solid rgba(255, 255, 255, 0.2);
        }

        /* Анимации */
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes scaleUp {
            from { transform: scale(0.8); opacity: 0; }
            to { transform: scale(1); opacity: 1; }
        }
    </style>
</head>
<body>

    <!-- Фоновое видео (изначально muted, чтобы браузер ГАРАНТИРОВАННО разрешил его показ сзади кнопок) -->
    <video id="bgVideo" class="bg-video" autoplay loop playsinline muted preload="auto" src="media/background.mp4">
    </video>
    
    <div class="overlay"></div>
    
    <div class="container">
        <h1>С Днём Рождения, Дарина! 🎂</h1>
        <p>mellstroy.game</p>
        
        <button class="gift-btn" onclick="openGift()">🎁 Получить подарок</button>
        
        <!-- Модалка выбора подарка -->
        <div class="modal hidden" id="giftModal">
            <div class="modal-box">
                <span class="close" onclick="closeGift()">✕</span>
                <h2>Выбери подарок 🎉</h2>
                <button onclick="openMedia('photo')">📸 Фото</button>
                <button onclick="openMedia('video')">🎥 Видео</button>
            </div>
        </div>
        
        <!-- Модалка показа фото/видео -->
        <div class="modal hidden" id="mediaModal">
            <span class="close" onclick="closeMedia()">✕</span>
            <div id="mediaContent"></div>
        </div>
    </div>
    
    <script>
        const bgVideo = document.getElementById('bgVideo');

        // Умный обработчик ошибок путей для фонового видео
        if (bgVideo) {
            bgVideo.addEventListener('error', function() {
                const currentSrc = bgVideo.getAttribute('src');
                if (currentSrc && currentSrc.includes('media/')) {
                    console.log("Видео не найдено в папе media/. Пробуем корень...");
                    bgVideo.src = 'background.mp4';
                    bgVideo.load();
                    bgVideo.play().catch(err => console.log("Ошибка воспроизведения из корня:", err));
                }
            }, true);
        }

        // Принудительно запускаем воспроизведение видео (в беззвучном режиме для обхода блокировок)
        function forcePlayBackground() {
            if (bgVideo) {
                bgVideo.muted = true; 
                bgVideo.play().catch(err => {
                    console.log("Браузер заблокировал автоплей. Ждем действия пользователя.");
                });
            }
        }

        // Запуск при загрузке документа
        document.addEventListener('DOMContentLoaded', forcePlayBackground);
        window.addEventListener('load', forcePlayBackground);

        // Функция включения звука при первом клике пользователя
        function enableSound() {
            if (bgVideo) {
                bgVideo.muted = false; // Включаем звук фонового видео
                bgVideo.play().catch(err => console.log("Не удалось включить звук:", err));
            }
            // Удаляем отслеживание клика, звук уже включен
            document.removeEventListener('click', enableSound);
            document.removeEventListener('touchstart', enableSound);
        }

        // Вешаем прослушиватели клика/касания для включения звука
        document.addEventListener('click', enableSound);
        document.addEventListener('touchstart', enableSound);

        function openGift() {
            enableSound(); // Гарантируем включение звука фона при клике на кнопку подарка
            document.getElementById('giftModal').classList.remove('hidden');
        }
        
        function closeGift() {
            document.getElementById('giftModal').classList.add('hidden');
        }
        
        function openMedia(type) {
            const mediaModal = document.getElementById('mediaModal');
            const mediaContent = document.getElementById('mediaContent');
            mediaContent.innerHTML = '';
            
            if (type === 'photo') {
                mediaContent.innerHTML = `<img id="giftImg" src="media/photo.jpg" alt="Подарок Дарине">`;
                
                const img = document.getElementById('giftImg');
                img.onerror = function() {
                    if (img.src.includes('media/')) {
                        console.log("Фото не найдено в media/. Пробуем корень...");
                        img.src = 'photo.jpg';
                    } else {
                        // Резервная заглушка, если вообще файла нет
                        img.src = 'https://images.unsplash.com/photo-1549417229-aa67d3263c09?w=800';
                    }
                };

            } else if (type === 'video') {
                mediaContent.innerHTML = `
                    <video id="giftVideo" autoplay controls playsinline style="width:100%;" src="media/video.mp4">
                        Ваш браузер не поддерживает видео.
                    </video>
                `;

                const giftVideo = document.getElementById('giftVideo');

                if (giftVideo) {
                    // Если видео в папке media/ выдаст ошибку, пробуем воспроизвести из корня папки
                    giftVideo.onerror = function() {
                        const currentSrc = giftVideo.getAttribute('src');
                        if (currentSrc && currentSrc.includes('media/')) {
                            console.log("Подарочное видео не найдено в media/. Пробуем корень...");
                            giftVideo.src = 'video.mp4';
                            giftVideo.load();
                            giftVideo.play().catch(err => console.log(err));
                        }
                    };

                    if (bgVideo) {
                        // СРАЗУ глушим фоновое видео при открытии подарочного медиаплеера
                        bgVideo.muted = true;

                        // Дополнительно вешаем обработчики на запуск и паузу
                        giftVideo.addEventListener('play', () => {
                            bgVideo.muted = true;
                        });

                        giftVideo.addEventListener('pause', () => {
                            bgVideo.muted = false;
                        });

                        // Когда подарочное видео доиграет до конца - возвращаем звук фона
                        giftVideo.addEventListener('ended', () => {
                            bgVideo.muted = false;
                        });
                    }
                }
            }
            
            closeGift();
            mediaModal.classList.remove('hidden');
        }
        
        function closeMedia() {
            const mediaModal = document.getElementById('mediaModal');
            const mediaContent = document.getElementById('mediaContent');
            
            // Очищаем плеер подарка (это остановит воспроизведение)
            mediaContent.innerHTML = ''; 
            mediaModal.classList.add('hidden');

            // Всегда возвращаем фоновый звук при закрытии окна
            if (bgVideo) {
                bgVideo.muted = false;
                bgVideo.play().catch(err => console.log(err));
            }
        }
    </script>
</body>
</html>
